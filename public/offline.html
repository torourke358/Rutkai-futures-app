<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Thor</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0b1220;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
      }
      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.1rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #94a3b8;
        font-size: 0.9rem;
        max-width: 22rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div>
        <h1>You're offline</h1>
        <p>
          Thor needs a connection to load your trades. Reconnect and reopen the
          app.
        </p>
      </div>
    </div>
  </body>
</html>
